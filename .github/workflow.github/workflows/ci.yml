name: QA Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20]

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Step 3: Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci

      # Step 4: Start server (IMPORTANT: adjust the port & timeout if needed)
      - name: Start API server
        run: npm start &
        env:
          NODE_ENV: test
          PORT: 3000

      # Step 5: Wait for server to be ready
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 10000

      # Step 6: Run tests with JUnit reporter
      - name: Run tests
        run: npm test -- --reporters=default --reporters=jest-junit
        env:
          NODE_ENV: test
          JEST_JUNIT_OUTPUT_DIR: ./
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      # Step 7: Upload test results (CRITICAL: always run, even if tests fail)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit.xml
          retention-days: 30

      # Step 8: Upload coverage report (optional, for visibility)
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
